<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · NewAPI Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--card:#131722;--border:#1e2a3a;--text:#e1e7f0;--text2:#6b7a99;
  --accent:#3b82f6;--accent4:#ef4444;--shadow:0 8px 40px rgba(0,0,0,.4);
}
html[data-theme="light"]{
  --bg:#f4f6fb;--card:#ffffff;--border:#e2e8f0;--text:#1a2233;--text2:#64748b;
  --shadow:0 8px 40px rgba(15,23,42,.08);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:36px 32px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-card h1{font-size:24px;font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:4px}
.login-card h1 span{color:var(--accent)}
.login-card .sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:28px}
.field{position:relative;margin-bottom:14px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:12px 14px;font-size:15px;transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:var(--accent4);font-size:13px;text-align:center;margin-top:14px;min-height:18px}
.theme-btn{position:fixed;top:18px;right:18px;background:var(--card);border:1px solid var(--border);
  color:var(--text2);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
<form class="login-card" onsubmit="return doLogin(event)">
  <h1>NewAPI <span>Monitor</span></h1>
  <div class="sub">请输入管理密码登录</div>
  <div class="field">
    <input type="password" id="pw" placeholder="管理密码" autofocus autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" type="submit">登 录</button>
  <div class="err" id="err"></div>
</form>
<script>
// Theme (shared key with dashboard)
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'light' ? '☀️' : '🌙';
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('theme') === 'light' ? 'light' : 'dark');

async function doLogin(e){
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('err');
  err.textContent = '';
  btn.disabled = true;
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    if (resp.ok) {
      location.href = '/';
    } else {
      const d = await resp.json().catch(() => ({}));
      err.textContent = d.detail || '登录失败';
      btn.disabled = false;
    }
  } catch(ex) {
    err.textContent = '网络错误';
    btn.disabled = false;
  }
  return false;
}
</script>
</body>
</html>
