services:
  newapi-monitor:
    build: .
    container_name: newapi-monitor
    restart: unless-stopped
    ports:
      - "9217:9217"
    volumes:
      - ./app/data:/app/data
    env_file:
      - .env
    networks:
      - newapi-net

networks:
  newapi-net:
    external: true
    name: new-api_new-api-network